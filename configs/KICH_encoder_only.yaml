seed: 42
device: cuda
out_dir: outputs/KICH_encoder_only_v2

train_positive_pool_csv: outputs/KICH_proposal_pool_v1/train_positive_proposal_pool.csv
train_negative_pool_csv: outputs/KICH_proposal_pool_v1/train_negative_fixed_candidates.csv
val_positive_pool_csv: outputs/KICH_proposal_pool_v1/val_positive_proposal_pool.csv
val_negative_pool_csv: outputs/KICH_proposal_pool_v1/val_negative_fixed_candidates.csv

project: KICH
split_csv: ../data/TCGA/KICH/KICH_split_seed42.csv
svs_root: ../data/TCGA/KICH
h5_root: ../data/TCGA_PATCHES/KICH/patches 

img_size: 224
train_batch_size: 4
val_batch_size: 2
num_workers: 4

patch_batch_size: 128

max_train_slides: 32
max_val_slides: 16
balance_train_slides_by_label: true
balance_val_slides_by_label: true

stage2_full_ckpt: results/stage2_best_model/best_full_rebalancepos_200batch.pth

base_encoder:
  model_name: "./pretrained_models/dinov2-small"
  device: cuda

moe_encoder:
  moe_layers: [-3, -2]
  num_experts: 4
  shared_expert: true
  shared_alpha: 0.05

  routing_strategy: proto_topany
  top_k: 2
  min_experts: 1
  max_experts: 2
  routing_metric: cosine

  init_threshold: 0.0
  gate_init_scale: 1.2
  gate_noise_std: 0.02

  use_patch_guided_routing: false
  patch_guided_mode: residual
  patch_context_alpha: 0.3
  patch_summary_type: local
  patch_summary_kernel: 5

  use_routing_proj: false
  routing_proj_dim: 384
  routing_proj_hidden_dim: 384
  routing_proj_dropout: 0.0

  use_cluster_bias: false
  num_clusters: 6
  cluster_bias_scale: 0.05
  background_cluster_ids: [5]

  use_cluster_candidate_mask: false
  cluster_candidate_k: 2
  soft_candidate_mask: false
  candidate_penalty: 1.5

role_proto_dir: analysis_outputs/KICH_role_proto_v1
role_tau: 1.0
use_last_moe_output: true

train_last_gate: true
train_last_experts: true

epochs: 8
lr: 2.0e-5
weight_decay: 1.0e-4

margin_pos: 0.08
margin_neg: 0.10
role_proto_loss_weight: 1.0

proto_tumor_name: tumor
proto_negative_role_names: ["stroma", "normal_kidney_parenchyma"]

enable_slide_proxy_loss: true
slide_proxy_loss_weight: 0.05
slide_proxy_topk: 8

preserve_loss_weight: 0.01

context_weight_mode: none
alpha_tumor_prob: 1.0
alpha_top1_gap: 1.0
alpha_context: 1.0
detach_weight: true
show_inner_patch_progress: false

rank_loss_weight: 0.2
margin_rank: 0.03
rank_mode: topk_mean
rank_topk: 8

use_strong_pos_support: true
allow_pos_support_fallback: true
min_pos_keep: 4

pos_support_min_tumor_prob: 0.33
pos_support_min_center_gap: 0.00
pos_support_min_top1_gap: -1.0e6
pos_support_min_context_score: -1.0e6
pos_support_min_neighbor_gap_mean: 0.00
pos_support_min_neighbor_gap_max: 0.02
pos_support_min_neighbor_prob_mean: -1.0e6
pos_support_min_neighbor_prob_max: -1.0e6

pos_fallback_min_tumor_prob: 0.31
pos_fallback_min_center_gap: -0.02
pos_fallback_min_top1_gap: -1.0e6
pos_fallback_min_context_score: -1.0e6
pos_fallback_min_neighbor_gap_mean: -0.03
pos_fallback_min_neighbor_gap_max: 0.00
pos_fallback_min_neighbor_prob_mean: -1.0e6
pos_fallback_min_neighbor_prob_max: -1.0e6

online_pos_topk: 24
online_neg_topk: 24