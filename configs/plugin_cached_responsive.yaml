seed: 42
device: cuda

epochs: 20
batch_size: 8
num_workers: 4
lr: 1.0e-4
weight_decay: 1.0e-4

train_cache_csv: ./outputs/plugin_cache/train/train_cache_index.csv
val_cache_csv: ./outputs/plugin_cache/val/val_cache_index.csv
test_cache_csv: ./outputs/plugin_cache/test/test_cache_index.csv

role_proto_dir: ./outputs/role_proto_init_virchow2_layer26_405/3role_v1
out_dir: ./outputs/plugin_cached_bag/v1

max_patches_per_slide: 256
random_sample_patches: true

plugin_feat_dim: 384
plugin_hidden_dim: 128
plugin_dropout: 0.0
plugin_init_scale: 0.05

use_role_logits: false
use_top1_gap: true
use_beta: true

shared_proto_learnable: false
proto_anchor_weight: 0.1
role_tau: 1.0

mil_model: abmil
run_no_plugin_baseline: true

feat_preserve_weight: 0.01
preserve_mode: l2