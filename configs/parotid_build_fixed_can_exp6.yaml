seed: 42
device: cuda
out_dir: outputs/parotid_proposal_pool_ablation_exp6

split_csv: ../data/Parotid/parotid_split_seed42.csv

img_size: 224
patch_batch_size: 512
max_patches_per_slide: 1024
random_sample_patches: true
show_inner_patch_progress: false

build_splits: ["train", "val"]

stage2_full_ckpt: distill_checkpoints_stage2_ablation_exp6/best_full.pth

base_encoder:
  model_name: "./pretrained_models/dinov2-small"
  device: cuda

moe_encoder:
  moe_layers: [-3, -2]
  num_experts: 6
  shared_expert: true
  shared_alpha: 0.05

  routing_strategy: proto_topany
  top_k: 2
  min_experts: 1
  max_experts: 2
  routing_metric: cosine

  init_threshold: 0.0
  gate_init_scale: 1.2
  gate_noise_std: 0.02

  use_patch_guided_routing: false
  patch_guided_mode: residual
  patch_context_alpha: 0.3
  patch_summary_type: local
  patch_summary_kernel: 5

  use_routing_proj: false
  routing_proj_dim: 384
  routing_proj_hidden_dim: 384
  routing_proj_dropout: 0.0

  use_cluster_bias: false
  num_clusters: 6
  cluster_bias_scale: 0.05
  background_cluster_ids: [5]

  use_cluster_candidate_mask: false
  cluster_candidate_k: 2
  soft_candidate_mask: false
  candidate_penalty: 1.5

role_proto_dir: analysis_outputs/Parotid_role_proto_ablation_5role
role_tau: 1.0
use_last_moe_output: true

proto_tumor_name: tumor
proto_negative_role_names: ["stroma", "normal_epithelium","immune","necrosis"]

# ---------- neighbor ----------
neighbor_radius: 1024
neighbor_min_count: 4
neighbor_k_fallback: 8

# ---------- context score ----------
pos_ctx_center_weight: 1.0
pos_ctx_neighbor_weight: 1.0
pos_ctx_neighbor_max_weight: 0.25
pos_ctx_prob_weight: 0.25
pos_ctx_top1_weight: 0.10
pos_ctx_consistency_weight: 0.30

neg_ctx_center_weight: 1.0
neg_ctx_neighbor_weight: 1.0
neg_ctx_isolation_weight: 0.60
neg_ctx_prob_weight: 0.20
neg_ctx_top1_weight: 0.10

# ---------- positive proposal pool ----------
pos_pool_topk_tumor: 64
pos_pool_topk_context: 64
pos_pool_max_merged: 128

pos_pool_min_tumor_prob: 0.28
pos_pool_min_center_gap: -0.05
pos_pool_min_neighbor_gap_mean: -1000000

pos_pool_tumor_gap_weight: 1.0
pos_pool_tumor_prob_weight: 0.5
pos_pool_top1_gap_weight: 0.2

pos_pool_context_weight: 1.0
pos_pool_neighbor_gap_mean_weight: 0.3
pos_pool_neighbor_gap_max_weight: 0.2

# ---------- negative fixed candidates ----------
neg_topk: 32
neg_min_tumor_prob: 0.33
neg_min_center_gap: 0.00
neg_max_neighbor_gap: 0.00
neg_max_neighbor_gap_max: 0.05
neg_min_top1_gap: -1000000

neg_fallback_min_tumor_prob: 0.30
neg_fallback_min_center_gap: -0.03