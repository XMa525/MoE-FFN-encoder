base_encoder:
  model_name: "./pretrained_models/dinov2-small"
  device: cuda

moe_encoder:
  moe_layers: [-3, -2]
  num_experts: 6
  shared_expert: True
  shared_alpha: 0.05

  routing_strategy: proto_topany
  top_k: 2
  min_experts: 1
  max_experts: 2
  routing_metric: cosine

  init_threshold: 0.00
  gate_init_scale: 1.2
  gate_noise_std: 0.02

  use_routing_proj: False
  routing_proj_dim: 384
  routing_proj_hidden_dim: 384
  routing_proj_dropout: 0.0

  use_cluster_bias: False
  num_clusters: 6
  cluster_bias_scale: 0.05
  background_cluster_ids: [5]

  use_cluster_candidate_mask: False
  cluster_candidate_k: 2
  soft_candidate_mask: False
  candidate_penalty: 1.5
  

moe_loss:
  enable: true

  diversity_weight: 0.50
  load_balance_weight: 0.20
  coverage_weight: 0.05
  sparsity_weight: 0.05

  routing_sim_weight: 0.0
  cluster_weight: 0.00

  target_active_experts: 1.4
  token_reweight: False
  token_reweight_min: 0.3

  use_group_guided_routing: False
  group_guided_weight: 0.05

  num_offline_clusters: 6
  valid_cluster_ids: [0, 1, 4]
  background_cluster_ids: [5]
  group_guided_num_experts: 6

  use_cluster_specialization: False
  spec_weight: 0.02
  spec_align_weight: 1.0 #align_loss 的权重
  spec_margin_weight: 0.5 #margin_loss 的权重

  use_cluster_anchor: False
  anchor_weight: 0.0
  cluster_anchor_map:
    0: 0
    1: 1
    
  use_prototype_specialization: False
  proto_spec_weight: 0.02

  proto_layer_weights: [1.0, 0.2]   # 第一层强，第二层弱

  proto_main_margin: 0.05
  #proto_shared_margin: 0.0

  proto_main_weight: 1.0
stage2_train:
  epochs: 5
  lr: 5.0e-5
  weight_decay: 0.05
  clip_grad_norm: 1.0

  batch_size: 128
  num_workers: 4
  val_ratio: 0.2
  val_max_batches: 50
  num_batches_per_epoch: 200
  project_sampler_cache: outputs/dataset_cache/tcga_project_indices_splitbyslide.pkl

  ckpt_dir: distill_checkpoints_stage2_ablation_exp6

  align_weight: 0.10
  cls_align_weight: 0.02

  proto_sep_weight: 1.0
  proto_margin: 0.10

  cluster_sep_weight: 0.0
  cluster_margin: 0.10

  intra_compact_weight: 0.0

  routing_stability_weight: 0.01
  z_loss_weight: 1.0e-4

  valid_cluster_ids: [0, 1, 4]
  use_last_moe_output: true

  sp_loss_weight: 0.0
  sp_layers: [-1]
  sp_use_soft_weight: false
  sp_min_active_experts: 2

  use_expert_floor: false
  expert_floor_weight: 0.0
  expert_floor_tau: 0.03
  expert_floor_layers: [0]

  role_proto_weight: 0.10
  role_proto_dir: outputs/role_proto_init_virchow2_layer26_405/ablation_5role
  free_expert_id: 5

  role_tau: 0.07
  role_attraction_weight: 1.0
  role_separation_weight: 0.5
  role_target_weight: 1.0
  role_margin: 0.05

  role_use_conf_mask: true
  role_conf_thresh: 0.50
  max_role_tokens_per_batch: 0

  role_use_margin_mask: True
  role_margin_conf_thresh: 0.08

  use_stage2_mask: false

  role_balance_semantic_sampling: True
  max_role_tokens_per_expert: 2048

  use_free_expert_floor: true
  free_expert_floor_weight: 0.03
  free_expert_floor_tau: 0.08

  use_role_asymmetric_weighting: True
  use_tumor_preference_loss: false

  

  use_wsi_bag_loss: false
  wsi_bag_loss_weight: 0.05

  use_wsi_bag_margin_loss: false
  wsi_bag_margin_weight: 0.05
  wsi_bag_margin: 0.10

  use_wsi_asymmetric_loss: false

  wsi_pos_bce_weight: 0.0
  wsi_neg_bce_weight: 0.01

  wsi_pos_margin_weight: 0.0
  wsi_neg_margin_weight: 0.05

  wsi_pos_margin: 0.0
  wsi_neg_margin: 0.10

  use_wsi_pos_tail_protect: false
  wsi_pos_tail_protect_weight: 0.01
  wsi_pos_tail_ratio: 0.01
  wsi_pos_tail_min: 2
  wsi_pos_tail_floor: 0.00

  wsi_topk_ratio: 0.1
  wsi_topk_min: 4
  wsi_topk_max: 16
  wsi_patch_batch_size: 8
  wsi_bag_size: 32
  wsi_min_bag_size: 8
  slide_label_col: "slide_label"

  use_hn_repulsion_loss: false
  hn_repulsion_weight: 0.02
  hn_repulsion_margin: 0.05

  use_online_hn_repulsion_loss: false
  online_hn_repulsion_weight: 0.01
  online_hn_repulsion_margin: 0.05

  online_hn_use_classes: ["gland_like_sub3", "fibrous_dense"]
  online_hn_topk_per_class: 64
  online_hn_min_sim_to_center: -1.0
  online_hn_require_tumor_dominant: true
  online_hn_max_delta: 0.05

  online_hn_gland_like_min_sim_to_center: 0.50
  online_hn_fibrous_dense_min_sim_to_center: -1.0

  hn_bank_dir: analysis_outputs/hn_repulsion_bank_v2
  hn_use_classes: ["gland_like_sub3", "fibrous_dense"]
  hn_batch_size_per_class: 64
  hn_l2_normalize_bank: true

  early_stop_patience: 5
  early_stop_min_delta: 1.0e-4

  use_wsi_bag_sampling: true

  use_negative_context_hn_loss: false
  negative_context_hn_weight: 0.01

  neg_ctx_trigger_score: 0.005
  neg_ctx_neighbor_support_max: 0.00
  neg_ctx_gap_margin: 0.005

  neg_ctx_use_topk_neighbor: false
  neg_ctx_topk_ratio: 0.25
  neg_ctx_topk_min: 2
  neg_ctx_topk_max: 8
  neg_ctx_min_neighbors: 1

  use_positive_context_protection: false
  positive_context_protect_weight: 0.002

  pos_ctx_trigger_score: 0.005
  pos_ctx_neighbor_support_min: 0.002
  pos_ctx_score_floor: 0.0

  use_neg_global_topk_suppression: false
  neg_global_topk_weight: 0.00
  neg_global_topk_margin: 0.00

  use_spatial_neighbor_sampling: true
  spatial_neighbor_csv: analysis_outputs/dense_negative_neighbor_bank_v1.csv
  spatial_neighbor_max_k: 8

  use_conditional_pairwise_ranking: True

  cond_rank_neg_weight: 0.05
  cond_rank_pos_weight: 0.04

  cond_rank_neg_margin: 0.10
  cond_rank_pos_margin: 0.08

  cond_rank_neg_topk: 8
  cond_rank_pos_topk: 4

  cond_rank_neg_topk_ratio: 0.0
  cond_rank_pos_topk_ratio: 0.0

  cond_rank_pos_select_mode: "tumor_minus_other"

  cond_rank_pos_min_tumor_score: -0.05
  cond_rank_pos_min_gap: -0.08

  cond_rank_allow_empty_pos: True

  use_residual_hn_push: false
  residual_hn_push_weight: 0.005
  residual_hn_push_margin: 0.04
  residual_hn_min_gap: 0.0
  residual_hn_max_gap: 0.05
  residual_hn_target_expert: null

  use_neg_rank_free_preference: false
  neg_rank_free_pref_weight: 0.03
  neg_rank_free_pref_eps: 1.0e-6
  neg_rank_free_pref_min_gap: -0.05
  neg_rank_free_pref_max_gap: 0.05

  use_positive_anchor_boost: false
  positive_anchor_weight: 0.03
  positive_anchor_margin: 0.04

  positive_anchor_topk: 6
  positive_anchor_topk_ratio: 0.0
  positive_anchor_select_mode: "tumor_minus_other"

  positive_anchor_min_tumor_score: -0.20
  positive_anchor_min_gap: -0.06
  positive_anchor_allow_empty: true
  
  use_neg_preselection: true
  neg_preselect_target_expert: null
  neg_preselect_min_tumor_score: 0.10
  neg_preselect_min_gap: -0.06
  neg_preselect_max_gap: 0.10
  neg_preselect_require_tumor_dominant: false
  neg_preselect_allow_fallback: true


  use_context_guided_selection: true

  ctx_score_alpha: 1.0
  ctx_score_beta: 0.8
  ctx_score_gamma: 0.3

  ctx_pos_consistency_weight: 0.20
  ctx_neg_isolation_weight: 0.25

  ctx_use_topk_neighbor: true
  ctx_topk_ratio: 0.25
  ctx_topk_min: 2
  ctx_topk_max: 8

  ctx_allow_no_neighbor_fallback: true

  use_batch_context_guided_loss: true
  batch_context_loss_weight: 0.02

  batch_ctx_neg_center_min: 0.05
  batch_ctx_neg_neighbor_max: 0.00
  batch_ctx_neg_margin: 0.05

  batch_ctx_pos_center_min: -0.03
  batch_ctx_pos_neighbor_min: -0.01
  batch_ctx_pos_margin: 0.04

  batch_ctx_use_topk_neighbor: true
  batch_ctx_topk_ratio: 0.25
  batch_ctx_topk_min: 2
  batch_ctx_topk_max: 8
  batch_ctx_pos_neighbor_scale: 0.5

  use_positive_context_ranking: true
  pos_ctx_rank_center_weight: 1.0
  pos_ctx_rank_neighbor_weight: 1.0
  pos_ctx_rank_neighbor_max_weight: 0.3
  pos_ctx_rank_support_weight: 0.3
  pos_ctx_rank_consistency_weight: 0.5

  use_pos_expert_balanced_selection: true
  pos_semantic_expert_ids: [0, 1, 2, 3, 4]
  cond_rank_pos_topk_per_expert: 2
  pos_topk_per_expert_map:
    0: 1
    1: 2
    2: 2
    3: 1
    4: 1
  cond_rank_pos_allow_partial_experts: true

  # B: stronger positive support mask
  use_pos_support_mask: true
  pos_support_center_min: -0.05
  pos_support_neighbor_min: -0.02
  pos_support_neighbor_max_min: 0.00
  pos_support_min_tumor_score: -0.02
  pos_support_allow_fallback: true

  # C: per-slide dedup
  use_pos_slide_dedup: true
  pos_max_tokens_per_slide_per_expert: 1

  pos_min_selected_experts: 2
  pos_require_min_experts: false

 