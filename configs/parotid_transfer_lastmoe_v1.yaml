seed: 42
device: cuda
out_dir: outputs/parotid_transfer_lastmoe_v3

split_csv: ../data/Parotid/parotid_split_seed42.csv

img_size: 224

train_batch_size: 1
val_batch_size: 1
test_batch_size: 1
num_workers: 4

patch_batch_size: 64
max_patches_per_slide: 768
random_sample_patches: true

max_train_slides: 32
max_val_slides: 12
max_test_slides: 12
balance_train_slides_by_label: true
balance_val_slides_by_label: true
balance_test_slides_by_label: true

stage2_full_ckpt: results/stage2_best_model/best_full_rebalancepos_200batch.pth

base_encoder:
  model_name: "./pretrained_models/dinov2-small"
  device: cuda

moe_encoder:
  moe_layers: [-3, -2]
  num_experts: 4
  shared_expert: true
  shared_alpha: 0.05

  routing_strategy: proto_topany
  top_k: 2
  min_experts: 1
  max_experts: 2
  routing_metric: cosine

  init_threshold: 0.00
  gate_init_scale: 1.2
  gate_noise_std: 0.02

  use_patch_guided_routing: false
  patch_guided_mode: "residual"
  patch_context_alpha: 0.3
  patch_summary_type: "local"
  patch_summary_kernel: 5

  use_routing_proj: false
  routing_proj_dim: 384
  routing_proj_hidden_dim: 384
  routing_proj_dropout: 0.0

  use_cluster_bias: false
  num_clusters: 6
  cluster_bias_scale: 0.05
  background_cluster_ids: [5]

  use_cluster_candidate_mask: false
  cluster_candidate_k: 2
  soft_candidate_mask: false
  candidate_penalty: 1.5

role_proto_dir: analysis_outputs/Parotid_role_proto_v2
role_tau: 1.0
use_role_logits: false

use_last_moe_output: true

train_last_gate: true
train_last_experts: true

mil_model: abmil

use_plugin: false
plugin_hidden_dim: 128
plugin_dropout: 0.0
plugin_init_scale: 0.05
use_top1_gap: true
use_beta: true
feat_preserve_weight: 0.01

mil_init_ckpt: results/downstream/stage2/Parotid100/best_abmil.pt

phase0_epochs: 1
phase0_lr: 1.0e-4
phase0_train_plugin: false

phase1_epochs: 5
lr: 2.0e-5

run_phase2_only_mil: true
phase2_epochs: 3
phase2_lr: 1.0e-4
phase2_train_plugin: false


weight_decay: 1.0e-4

# ===== role proto loss (Phase1 only) =====
enable_phase1_role_proto_loss: true
role_proto_loss_weight: 0.2
role_proto_margin: 0.20
role_proto_conf_thresh: 0.50
role_proto_top1_gap_thresh: 0.03
role_proto_min_kept: 4

proto_tumor_name: tumor
proto_negative_role_names: ["stroma", "normal_epithelium"]

# Phase0 plugin control
phase0_train_plugin: false
